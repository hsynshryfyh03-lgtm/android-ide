# ╔════════════════════════════════════════════════════════════════╗
# ║  🚀 Android APK Smart Builder  v3.0 (Final Fixed)             ║
# ║  بديل ذكي وقوي لـ Android Studio على GitHub Actions           ║
# ║                                                                ║
# ║  ✅ يدعم Java + Kotlin                                        ║
# ║  ✅ يكتشف إعدادات المشروع تلقائياً                             ║
# ║  ✅ يستورد جميع المكتبات تلقائياً                              ║
# ║  ✅ يبني APK من ملف ZIP مباشرة                                ║
# ║  ✅ يدعم NDK + CMake                                          ║
# ║  ✅ يدعم Groovy DSL و Kotlin DSL                              ║
# ║  ✅ يختار JDK المتوافق مع Gradle تلقائياً                      ║
# ╚════════════════════════════════════════════════════════════════╝

name: 🚀 Android APK Builder

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both
      java_version:
        description: 'إصدار Java (auto = كشف تلقائي)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - '8'
          - '11'
          - '17'
          - '21'

permissions:
  contents: read

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configuration-cache=false
  JAVA_TOOL_OPTIONS: "-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"

jobs:
  build:
    name: 🔨 Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      # ──────────────────────────────────
      #  📥 STEP 1: Checkout
      # ──────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ──────────────────────────────────
      #  📦 STEP 2: Extract ZIP
      # ──────────────────────────────────
      - name: 📦 Detect & Extract Project from ZIP
        id: extract
        run: |
          set -eo pipefail

          echo "╔══════════════════════════════════════════╗"
          echo "║  📦 Smart ZIP Detection & Extraction     ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          mapfile -t ZIP_FILES < <(find . -maxdepth 1 -name "*.zip" -type f 2>/dev/null | sort)

          if [ ${#ZIP_FILES[@]} -eq 0 ]; then
            echo "📂 لا يوجد ملف ZIP - سيتم استخدام ملفات المشروع مباشرة"
            echo "has_zip=false" >> "$GITHUB_OUTPUT"

            if find . -maxdepth 1 \( -name "settings.gradle*" -o -name "build.gradle*" \) \
               -type f 2>/dev/null | grep -q .; then
              echo "✅ تم العثور على مشروع Android في المستودع"
            else
              echo "❌ خطأ: لا يوجد مشروع Android!"
              exit 1
            fi
            exit 0
          fi

          echo "has_zip=true" >> "$GITHUB_OUTPUT"
          ZIP_FILE="${ZIP_FILES[0]}"
          ZIP_SIZE=$(du -sh "$ZIP_FILE" | cut -f1)
          echo "📦 تم العثور على: $ZIP_FILE ($ZIP_SIZE)"

          EXTRACT_DIR=$(mktemp -d)
          echo "📂 جاري فك الضغط..."
          unzip -q -o "$ZIP_FILE" -d "$EXTRACT_DIR"

          echo "🔍 البحث عن جذر المشروع..."
          PROJECT_ROOT=""

          for depth in $(seq 0 5); do
            FOUND=$(find "$EXTRACT_DIR" -mindepth "$depth" -maxdepth "$depth" \
              \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
              -not -path "*/build/*" -type f 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              PROJECT_ROOT=$(dirname "$FOUND")
              echo "  ✅ عثر على settings.gradle في العمق $depth"
              break
            fi
          done

          if [ -z "$PROJECT_ROOT" ]; then
            for depth in $(seq 0 5); do
              while IFS= read -r bf; do
                DIR=$(dirname "$bf")
                if [ -d "$DIR/app" ]; then
                  PROJECT_ROOT="$DIR"
                  echo "  ✅ عثر على build.gradle + app/ في العمق $depth"
                  break 2
                fi
              done < <(find "$EXTRACT_DIR" -mindepth "$depth" -maxdepth "$depth" \
                \( -name "build.gradle" -o -name "build.gradle.kts" \) \
                -not -path "*/build/*" -type f 2>/dev/null)
            done
          fi

          if [ -z "$PROJECT_ROOT" ]; then
            for depth in $(seq 0 5); do
              FOUND=$(find "$EXTRACT_DIR" -mindepth "$depth" -maxdepth "$depth" \
                \( -name "build.gradle" -o -name "build.gradle.kts" \) \
                -not -path "*/build/*" -type f 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                PROJECT_ROOT=$(dirname "$FOUND")
                echo "  ✅ عثر على build.gradle في العمق $depth"
                break
              fi
            done
          fi

          if [ -z "$PROJECT_ROOT" ]; then
            echo "❌ خطأ: لم يتم العثور على مشروع Gradle داخل ZIP!"
            echo "📁 محتويات ZIP:"
            find "$EXTRACT_DIR" -maxdepth 4 -type f | head -40
            rm -rf "$EXTRACT_DIR"
            exit 1
          fi

          echo "📁 جذر المشروع: $PROJECT_ROOT"

          GITHUB_BACKUP=$(mktemp -d)
          cp -r .github "$GITHUB_BACKUP/" 2>/dev/null || true

          find . -maxdepth 1 -not -name '.' -not -name '.git' -exec rm -rf {} + 2>/dev/null || true

          shopt -s dotglob nullglob
          cp -rf "$PROJECT_ROOT"/* ./ 2>/dev/null || true
          find "$PROJECT_ROOT" -maxdepth 1 -name ".*" \
            -not -name "." -not -name ".." -not -name ".git" \
            -exec cp -rf {} ./ \; 2>/dev/null || true
          shopt -u dotglob nullglob

          cp -rf "$GITHUB_BACKUP/.github" ./ 2>/dev/null || true
          rm -rf "$EXTRACT_DIR" "$GITHUB_BACKUP"

          echo "🧹 تنظيف مجلدات البناء السابقة..."
          find . -type d -name "build" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".gradle" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true

          echo ""
          echo "📋 هيكل المشروع بعد الاستخراج:"
          find . -maxdepth 2 -not -path './.git/*' -not -path './.git' \
            -not -path './build/*' | sort | head -50
          echo ""

      # ──────────────────────────────────
      #  🔍 STEP 3: Auto-Detect Config
      # ──────────────────────────────────
      - name: 🔍 Auto-Detect Project Configuration
        id: config
        shell: bash
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  🔍 Auto-Detection Engine                ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          # دالة آمنة للبحث
          safe_grep() {
            grep -rh "$@" \
              --include="*.gradle" \
              --include="*.gradle.kts" \
              --exclude-dir=build \
              --exclude-dir=.gradle \
              --exclude-dir=.gradle-cache \
              . 2>/dev/null || echo ""
          }

          # ═══════════════════════════════
          # 🔤 كشف لغة البرمجة
          # ═══════════════════════════════
          KT=$(find . -name "*.kt" -not -path "*/build/*" -not -path "*/.gradle/*" -type f 2>/dev/null | wc -l || echo "0")
          JV=$(find . -name "*.java" -not -path "*/build/*" -not -path "*/.gradle/*" -not -path "*/generated/*" -type f 2>/dev/null | wc -l || echo "0")

          if [ "$KT" -gt 0 ] && [ "$JV" -gt 0 ]; then
            LANG="kotlin+java"
            echo "🟣🟠 لغة المشروع: Kotlin ($KT ملف) + Java ($JV ملف)"
          elif [ "$KT" -gt 0 ]; then
            LANG="kotlin"
            echo "🟣 لغة المشروع: Kotlin ($KT ملف)"
          elif [ "$JV" -gt 0 ]; then
            LANG="java"
            echo "🟠 لغة المشروع: Java ($JV ملف)"
          else
            LANG="unknown"
            echo "⚪ لم يتم كشف ملفات مصدرية"
          fi
          echo "language=$LANG" >> "$GITHUB_OUTPUT"

          # ═══════════════════════════════
          # 📝 كشف نوع DSL
          # ═══════════════════════════════
          if [ -f "build.gradle.kts" ] || [ -f "settings.gradle.kts" ]; then
            echo "dsl=kotlin" >> "$GITHUB_OUTPUT"
            echo "📝 نوع DSL: Kotlin Script (.kts)"
          else
            echo "dsl=groovy" >> "$GITHUB_OUTPUT"
            echo "📝 نوع DSL: Groovy"
          fi

          # ═══════════════════════════════
          # 📄 قراءة ملفات Gradle
          # ═══════════════════════════════
          GRADLE_CONTENT=$(safe_grep "")

          # ═══════════════════════════════
          # 📦 كشف إصدار Gradle (أولاً!)
          # ═══════════════════════════════
          GRADLE_VER=""
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            GRADLE_VER=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties 2>/dev/null \
              | grep -oP 'gradle-\K[0-9]+\.[0-9]+(\.[0-9]+)?' 2>/dev/null || echo "")
          fi
          if [ -z "$GRADLE_VER" ]; then
            GRADLE_VER="8.7"
          fi
          echo "gradle_version=$GRADLE_VER" >> "$GITHUB_OUTPUT"
          echo "📦 Gradle: $GRADLE_VER"

          GRADLE_MAJOR=$(echo "$GRADLE_VER" | cut -d. -f1)
          GRADLE_MINOR=$(echo "$GRADLE_VER" | cut -d. -f2)

          # ═══════════════════════════════
          # ☕ كشف JDK متوافق مع Gradle
          # ═══════════════════════════════
          INPUT_JDK="${{ github.event.inputs.java_version }}"

          if [ -n "$INPUT_JDK" ] && [ "$INPUT_JDK" != "auto" ]; then
            JDK="$INPUT_JDK"
            echo "☕ إصدار JDK (يدوي): $JDK"
          else
            # حساب أقصى JDK يدعمه إصدار Gradle
            MAX_JDK="21"
            if [ "$GRADLE_MAJOR" -lt 7 ]; then
              MAX_JDK="11"
            elif [ "$GRADLE_MAJOR" -eq 7 ]; then
              if [ "$GRADLE_MINOR" -lt 3 ]; then
                MAX_JDK="16"
              elif [ "$GRADLE_MINOR" -lt 5 ]; then
                MAX_JDK="17"
              else
                MAX_JDK="18"
              fi
            elif [ "$GRADLE_MAJOR" -eq 8 ]; then
              if [ "$GRADLE_MINOR" -lt 3 ]; then
                MAX_JDK="19"
              elif [ "$GRADLE_MINOR" -lt 5 ]; then
                MAX_JDK="20"
              else
                MAX_JDK="21"
              fi
            fi

            echo "   أقصى JDK يدعمه Gradle $GRADLE_VER → $MAX_JDK"

            # كشف JDK المطلوب من ملفات المشروع
            DETECTED_JDK=""
            if echo "$GRADLE_CONTENT" | grep -qP "VERSION_21|jvmTarget.*[\"']21[\"']|sourceCompatibility.*21|JavaLanguageVersion\.of\(21\)" 2>/dev/null; then
              DETECTED_JDK="21"
            elif echo "$GRADLE_CONTENT" | grep -qP "VERSION_17|jvmTarget.*[\"']17[\"']|sourceCompatibility.*17|JavaLanguageVersion\.of\(17\)" 2>/dev/null; then
              DETECTED_JDK="17"
            elif echo "$GRADLE_CONTENT" | grep -qP "VERSION_11|jvmTarget.*[\"']11[\"']|sourceCompatibility.*11|JavaLanguageVersion\.of\(11\)" 2>/dev/null; then
              DETECTED_JDK="11"
            elif echo "$GRADLE_CONTENT" | grep -qP "VERSION_1_8|jvmTarget.*[\"']1\.8[\"']|jvmTarget.*[\"']8[\"']|sourceCompatibility.*1\.8|JavaLanguageVersion\.of\(8\)" 2>/dev/null; then
              DETECTED_JDK="11"
            fi

            if [ -n "$DETECTED_JDK" ]; then
              echo "   JDK المكتشف من المشروع: $DETECTED_JDK"
            fi

            # اختيار JDK النهائي مع ضمان التوافق
            if [ -n "$DETECTED_JDK" ]; then
              if [ "$DETECTED_JDK" -le "$MAX_JDK" ]; then
                JDK="$DETECTED_JDK"
              else
                JDK="$MAX_JDK"
                echo "   ⚠️ JDK $DETECTED_JDK أعلى من حد Gradle → تخفيض إلى $MAX_JDK"
              fi
            else
              if [ "$MAX_JDK" -ge 17 ]; then
                JDK="17"
              elif [ "$MAX_JDK" -ge 11 ]; then
                JDK="11"
              else
                JDK="11"
              fi
            fi

            # التأكد من أن JDK المختار متاح فعلاً في setup-java
            # الإصدارات المتاحة: 8, 11, 17, 21
            if [ "$JDK" -le 8 ]; then
              JDK="8"
            elif [ "$JDK" -le 11 ]; then
              JDK="11"
            elif [ "$JDK" -le 17 ]; then
              if [ "$MAX_JDK" -ge 17 ]; then
                JDK="17"
              else
                JDK="11"
              fi
            else
              if [ "$MAX_JDK" -ge 21 ]; then
                JDK="21"
              elif [ "$MAX_JDK" -ge 17 ]; then
                JDK="17"
              else
                JDK="11"
              fi
            fi

            echo "☕ إصدار JDK (تلقائي): $JDK"
            echo "   ✅ متوافق مع Gradle $GRADLE_VER (حد أقصى: JDK $MAX_JDK)"
          fi
          echo "jdk_version=$JDK" >> "$GITHUB_OUTPUT"

          # ═══════════════════════════════
          # 🤖 كشف SDK
          # ═══════════════════════════════
          COMPILE_SDK=""
          if [ -f "gradle/libs.versions.toml" ]; then
            COMPILE_SDK=$(grep -iP "^\s*(compileSdk|compile-sdk|android-compile)" \
              gradle/libs.versions.toml 2>/dev/null | grep -oP '[0-9]+' 2>/dev/null | head -1 || echo "")
          fi
          if [ -z "$COMPILE_SDK" ]; then
            RAW_COMPILE=$(echo "$GRADLE_CONTENT" | grep -i "compileSdk\|compileSdkVersion" 2>/dev/null || echo "")
            if [ -n "$RAW_COMPILE" ]; then
              COMPILE_SDK=$(echo "$RAW_COMPILE" \
                | grep -v '^\s*//' \
                | grep -v '^\s*\*' \
                | grep -oP '[0-9]{2,}' 2>/dev/null \
                | sort -rn \
                | head -1 || echo "")
            fi
          fi
          if [ -z "$COMPILE_SDK" ]; then
            COMPILE_SDK="35"
          fi

          TARGET_SDK=""
          RAW_TARGET=$(echo "$GRADLE_CONTENT" | grep -iE "targetSdk[^V]|targetSdkVersion" 2>/dev/null || echo "")
          if [ -n "$RAW_TARGET" ]; then
            TARGET_SDK=$(echo "$RAW_TARGET" | grep -v '^\s*//' | grep -oP '[0-9]{2,}' 2>/dev/null | sort -rn | head -1 || echo "")
          fi
          if [ -z "$TARGET_SDK" ]; then
            TARGET_SDK="$COMPILE_SDK"
          fi

          MIN_SDK=""
          RAW_MIN=$(echo "$GRADLE_CONTENT" | grep -iE "minSdk[^V]|minSdkVersion" 2>/dev/null || echo "")
          if [ -n "$RAW_MIN" ]; then
            MIN_SDK=$(echo "$RAW_MIN" | grep -v '^\s*//' | grep -oP '[0-9]+' 2>/dev/null | sort -n | head -1 || echo "")
          fi
          if [ -z "$MIN_SDK" ]; then
            MIN_SDK="21"
          fi

          BUILD_TOOLS=""
          RAW_BT=$(echo "$GRADLE_CONTENT" | grep -i "buildToolsVersion" 2>/dev/null || echo "")
          if [ -n "$RAW_BT" ]; then
            BUILD_TOOLS=$(echo "$RAW_BT" | grep -oP '"[^"]*"' 2>/dev/null | tr -d '"' | head -1 || echo "")
          fi

          echo "compile_sdk=$COMPILE_SDK" >> "$GITHUB_OUTPUT"
          echo "target_sdk=$TARGET_SDK" >> "$GITHUB_OUTPUT"
          echo "min_sdk=$MIN_SDK" >> "$GITHUB_OUTPUT"
          echo "build_tools=$BUILD_TOOLS" >> "$GITHUB_OUTPUT"

          echo "🤖 Compile SDK: $COMPILE_SDK"
          echo "🎯 Target SDK:  $TARGET_SDK"
          echo "📱 Min SDK:     $MIN_SDK"
          if [ -n "$BUILD_TOOLS" ]; then echo "🔧 Build Tools: $BUILD_TOOLS"; else echo "🔧 Build Tools: تلقائي"; fi

          # ═══════════════════════════════
          # 🔧 NDK و CMake
          # ═══════════════════════════════
          NDK_VER=""
          RAW_NDK=$(echo "$GRADLE_CONTENT" | grep -i "ndkVersion" 2>/dev/null || echo "")
          if [ -n "$RAW_NDK" ]; then
            NDK_VER=$(echo "$RAW_NDK" | grep -oP '"[^"]*"' 2>/dev/null | tr -d '"' | head -1 || echo "")
          fi
          CMAKE_VER=""
          RAW_CMAKE=$(echo "$GRADLE_CONTENT" | grep -i "cmake" 2>/dev/null || echo "")
          if [ -n "$RAW_CMAKE" ]; then
            CMAKE_VER=$(echo "$RAW_CMAKE" | grep -oP 'version\s*"?\K[0-9][0-9.]*' 2>/dev/null | head -1 || echo "")
          fi

          echo "ndk_version=$NDK_VER" >> "$GITHUB_OUTPUT"
          echo "cmake_version=$CMAKE_VER" >> "$GITHUB_OUTPUT"

          if [ -n "$NDK_VER" ]; then echo "🔧 NDK:   $NDK_VER"; else echo "🔧 NDK:   غير مستخدم"; fi
          if [ -n "$CMAKE_VER" ]; then echo "🔧 CMake: $CMAKE_VER"; else echo "🔧 CMake: غير مستخدم"; fi

          APP_ID=""
          RAW_APPID=$(echo "$GRADLE_CONTENT" | grep -i "applicationId" 2>/dev/null || echo "")
          if [ -n "$RAW_APPID" ]; then
            APP_ID=$(echo "$RAW_APPID" | grep -oP '"[^"]*"' 2>/dev/null | tr -d '"' | head -1 || echo "")
          fi
          if [ -n "$APP_ID" ]; then echo "📱 App ID: $APP_ID"; fi

          echo ""
          echo "══════════════════════════════════════════"
          echo "✅ اكتمل الكشف التلقائي بنجاح"

      # ──────────────────────────────────
      #  ☕ STEP 4: Setup JDK
      # ──────────────────────────────────
      - name: ☕ Setup JDK ${{ steps.config.outputs.jdk_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.config.outputs.jdk_version }}
          distribution: 'temurin'

      # ──────────────────────────────────
      #  🤖 STEP 5: Setup Android SDK
      # ──────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📜 Install SDK Components
        run: |
          echo "📜 قبول التراخيص..."
          mkdir -p "$ANDROID_HOME/licenses"

          cat > "$ANDROID_HOME/licenses/android-sdk-license" << 'LICENSES'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          d56f5187479451eabf01fb78af6dfcb131a6481e
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          LICENSES

          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > "$ANDROID_HOME/licenses/intel-android-extra-license"

          yes 2>/dev/null | sdkmanager --licenses > /dev/null 2>&1 || true

          echo ""
          echo "📦 تثبيت مكونات SDK..."

          COMPILE_SDK="${{ steps.config.outputs.compile_sdk }}"
          TARGET_SDK="${{ steps.config.outputs.target_sdk }}"
          BUILD_TOOLS="${{ steps.config.outputs.build_tools }}"
          NDK_VER="${{ steps.config.outputs.ndk_version }}"
          CMAKE_VER="${{ steps.config.outputs.cmake_version }}"

          echo "  📦 platforms;android-${COMPILE_SDK}"
          sdkmanager "platforms;android-${COMPILE_SDK}" > /dev/null 2>&1 || true

          if [ "$TARGET_SDK" != "$COMPILE_SDK" ]; then
            echo "  📦 platforms;android-${TARGET_SDK}"
            sdkmanager "platforms;android-${TARGET_SDK}" > /dev/null 2>&1 || true
          fi

          echo "  📦 platform-tools"
          sdkmanager "platform-tools" > /dev/null 2>&1 || true

          if [ -n "$BUILD_TOOLS" ]; then
            echo "  📦 build-tools;${BUILD_TOOLS}"
            sdkmanager "build-tools;${BUILD_TOOLS}" > /dev/null 2>&1 || true
          fi

          LATEST_BT=$(sdkmanager --list 2>/dev/null | grep -oP "build-tools;\S+" | tail -1 || echo "")
          if [ -n "$LATEST_BT" ]; then
            echo "  📦 $LATEST_BT"
            sdkmanager "$LATEST_BT" > /dev/null 2>&1 || true
          fi

          if [ -n "$NDK_VER" ]; then
            echo "  📦 ndk;${NDK_VER}"
            sdkmanager "ndk;${NDK_VER}" > /dev/null 2>&1 || true
          fi

          if [ -n "$CMAKE_VER" ]; then
            echo "  📦 cmake;${CMAKE_VER}"
            sdkmanager "cmake;${CMAKE_VER}" > /dev/null 2>&1 || true
          fi

          echo ""
          echo "✅ تم تثبيت جميع مكونات SDK"

      # ──────────────────────────────────
      #  📝 STEP 6: Configure
      # ──────────────────────────────────
      - name: 📝 Configure Project
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            if [ -n "${{ steps.config.outputs.ndk_version }}" ]; then
              echo "ndk.dir=$ANDROID_HOME/ndk/${{ steps.config.outputs.ndk_version }}"
            fi
          } > local.properties
          echo "✅ تم إنشاء local.properties"
          cat local.properties

      # ──────────────────────────────────
      #  🔧 STEP 7: Gradle Wrapper
      # ──────────────────────────────────
      - name: 🔧 Setup Gradle Wrapper
        run: |
          echo "🔧 إعداد Gradle Wrapper..."
          GRADLE_VER="${{ steps.config.outputs.gradle_version }}"

          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "✅ gradlew موجود"

            if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
              echo "⚠️ gradle-wrapper.jar مفقود - جاري الإصلاح..."
              mkdir -p gradle/wrapper
              wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
                -O /tmp/gradle-dl.zip 2>/dev/null || {
                GRADLE_VER="8.7"
                wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
                  -O /tmp/gradle-dl.zip
              }
              unzip -q /tmp/gradle-dl.zip -d /tmp/gradle-install
              /tmp/gradle-install/gradle-${GRADLE_VER}/bin/gradle wrapper \
                --gradle-version="${GRADLE_VER}" 2>/dev/null || true
              rm -rf /tmp/gradle-dl.zip /tmp/gradle-install
              chmod +x gradlew
              echo "✅ تم إصلاح Gradle Wrapper"
            fi
          else
            echo "⚠️ gradlew غير موجود - جاري الإنشاء..."
            wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
              -O /tmp/gradle-dl.zip 2>/dev/null || {
              GRADLE_VER="8.7"
              wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
                -O /tmp/gradle-dl.zip
            }
            unzip -q /tmp/gradle-dl.zip -d /tmp/gradle-install
            /tmp/gradle-install/gradle-${GRADLE_VER}/bin/gradle wrapper \
              --gradle-version="${GRADLE_VER}"
            rm -rf /tmp/gradle-dl.zip /tmp/gradle-install
            chmod +x gradlew
            echo "✅ تم إنشاء Gradle Wrapper (v${GRADLE_VER})"
          fi

          echo ""
          [ -f "gradlew" ] && echo "  ✅ gradlew" || echo "  ❌ gradlew"
          [ -f "gradle/wrapper/gradle-wrapper.jar" ] && echo "  ✅ wrapper.jar" || echo "  ❌ wrapper.jar"
          [ -f "gradle/wrapper/gradle-wrapper.properties" ] && echo "  ✅ wrapper.properties" || echo "  ❌ wrapper.properties"

      # ──────────────────────────────────
      #  💾 STEP 8: Cache
      # ──────────────────────────────────
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/native
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ steps.config.outputs.jdk_version }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ steps.config.outputs.jdk_version }}-
            gradle-${{ runner.os }}-

      # ──────────────────────────────────
      #  📥 STEP 9: Dependencies
      # ──────────────────────────────────
      - name: 📥 Resolve Dependencies
        run: |
          echo "📥 جاري تحميل الاعتماديات..."
          ./gradlew dependencies --no-daemon --stacktrace 2>&1 | tail -20 || true
          echo "✅ تم"

      # ──────────────────────────────────
      #  🏗️ STEP 10: Build APK
      # ──────────────────────────────────
      - name: 🏗️ Build Debug APK
        if: >-
          github.event_name != 'workflow_dispatch' || 
          github.event.inputs.build_type == 'debug' || 
          github.event.inputs.build_type == 'both'
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  🏗️ بناء Debug APK                       ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          if ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --build-cache \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"; then
            echo ""
            echo "✅ تم بناء Debug APK بنجاح!"
          else
            echo ""
            echo "⚠️ فشل - محاولة بديلة..."
            echo ""
            ./gradlew assembleDebug \
              --no-daemon \
              --stacktrace \
              --no-build-cache \
              --refresh-dependencies \
              -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
            echo ""
            echo "✅ تم بناء Debug APK (المحاولة الثانية)!"
          fi

      - name: 🏗️ Build Release APK
        if: >-
          github.event_name == 'workflow_dispatch' && 
          (github.event.inputs.build_type == 'release' || 
           github.event.inputs.build_type == 'both')
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  🏗️ بناء Release APK                     ║"
          echo "╚══════════════════════════════════════════╝"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release-keystore.jks
            ./gradlew assembleRelease \
              --no-daemon --stacktrace --build-cache \
              -Pandroid.injected.signing.store.file=/tmp/release-keystore.jks \
              -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
              -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
            rm -f /tmp/release-keystore.jks
          else
            ./gradlew assembleRelease \
              --no-daemon --stacktrace --build-cache \
              -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
          fi
          echo "✅ تم بناء Release APK!"
        continue-on-error: true

      # ──────────────────────────────────
      #  📊 STEP 11: Summary
      # ──────────────────────────────────
      - name: 📊 Build Summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║              📊 ملخص البناء                      ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  اللغة:        ${{ steps.config.outputs.language }}"
          echo "║  DSL:          ${{ steps.config.outputs.dsl }}"
          echo "║  JDK:          ${{ steps.config.outputs.jdk_version }}"
          echo "║  Gradle:       ${{ steps.config.outputs.gradle_version }}"
          echo "║  Compile SDK:  ${{ steps.config.outputs.compile_sdk }}"
          echo "║  Target SDK:   ${{ steps.config.outputs.target_sdk }}"
          echo "║  Min SDK:      ${{ steps.config.outputs.min_sdk }}"
          echo "╠══════════════════════════════════════════════════╣"

          APK_COUNT=0
          while IFS= read -r apk; do
            [ -z "$apk" ] && continue
            APK_COUNT=$((APK_COUNT + 1))
            SIZE=$(du -sh "$apk" 2>/dev/null | cut -f1)
            NAME=$(basename "$apk")
            echo "║  ✅ $NAME ($SIZE)"
          done < <(find . -name "*.apk" -not -path "*/intermediates/*" -not -path "*/.gradle/*" -type f 2>/dev/null | sort)

          if [ "$APK_COUNT" -eq 0 ]; then
            echo "║  ❌ لم يتم إنشاء APK"
          fi
          echo "╚══════════════════════════════════════════════════╝"

      # ──────────────────────────────────
      #  📤 STEP 12: Upload
      # ──────────────────────────────────
      - name: 📤 Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "APK-Debug-build${{ github.run_number }}"
          path: "**/build/outputs/apk/debug/**/*.apk"
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 0

      - name: 📤 Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "APK-Release-build${{ github.run_number }}"
          path: "**/build/outputs/apk/release/**/*.apk"
          if-no-files-found: ignore
          retention-days: 90
          compression-level: 0

      - name: 📤 Upload All APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "All-APKs-build${{ github.run_number }}"
          path: |
            **/build/outputs/apk/**/*.apk
            !**/intermediates/**
          if-no-files-found: ignore
          retention-days: 14
          compression-level: 0

      - name: 📤 Upload Build Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "Build-Reports-build${{ github.run_number }}"
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7

      # ──────────────────────────────────
      #  ✅ STEP 13: Final
      # ──────────────────────────────────
      - name: ✅ Final Status
        if: always()
        run: |
          APK_COUNT=$(find . -name "*.apk" -not -path "*/intermediates/*" -type f 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -gt 0 ]; then
            echo "🎉 تم البناء بنجاح! ($APK_COUNT ملف APK)"
            echo "📥 حمّل من Artifacts"
          else
            echo "❌ فشل البناء - راجع السجلات"
          fi
