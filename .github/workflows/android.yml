name: 🤖 Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ الحل الجذري لمشكلة gradle-wrapper.jar المفقود
      # setup-gradle مع gradle-version يثبّت Gradle مباشرة بدون حاجة لـ wrapper.jar
      - name: ⚙️ Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"
          cache-read-only: false

      - name: 🔐 Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore app/debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000 \
            -keyalg RSA -keysize 2048 -noprompt

      - name: 🔨 Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: 📦 Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: 📊 Show APK sizes
        run: |
          echo "=== Debug ==="
          ls -lh app/build/outputs/apk/debug/*.apk  || echo "not found"
          echo "=== Release ==="
          ls -lh app/build/outputs/apk/release/*.apk || echo "not found"

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Debug-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Release-build${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 🚀 Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }}"
          body: |
            📱 **AndroidIDE APK**
            🔨 Build: #${{ github.run_number }}
            📝 Commit: `${{ github.sha }}`
            💬 ${{ github.event.head_commit.message }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
