name: Build AndroidIDE APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Extract project from ZIP
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Found: $ZIP"
            unzip -q "$ZIP" -d /tmp/extracted
            PROJ=$(find /tmp/extracted -name "build.gradle" -path "*/app/build.gradle" | head -1 | xargs dirname | xargs dirname)
            echo "Project root: $PROJ"
            cp -r "$PROJ/." .
          fi

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sSfL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          JAR=$(find /tmp/gradle-dist -name "*wrapper*.jar" | head -1)
          cp "$JAR" gradle/wrapper/gradle-wrapper.jar
          echo "OK: $(du -sh gradle/wrapper/gradle-wrapper.jar)"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore app/debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000 \
            -keyalg RSA -keysize 2048 -noprompt

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Show APK info
        run: |
          echo "=== Debug APK ==="
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \;
          echo "=== Release APK ==="
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AndroidIDE-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AndroidIDE-Release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "AndroidIDE — Build #${{ github.run_number }}"
          body: "Build #${{ github.run_number }} — ${{ github.event.head_commit.message }}"
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
