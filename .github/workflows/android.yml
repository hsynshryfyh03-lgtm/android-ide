name: Build Android APK

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_TOOL_OPTIONS: "-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP if exists
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" -type f | head -1)
          [ -z "$ZIP" ] && echo "No ZIP" && exit 0
          echo "Extracting $ZIP"
          TD=$(mktemp -d)
          unzip -q -o "$ZIP" -d "$TD"
          PR=""
          for d in $(seq 0 5); do
            F=$(find "$TD" -mindepth "$d" -maxdepth "$d" \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -not -path "*/build/*" -type f | head -1)
            [ -n "$F" ] && PR=$(dirname "$F") && break
          done
          if [ -z "$PR" ]; then
            for d in $(seq 0 5); do
              F=$(find "$TD" -mindepth "$d" -maxdepth "$d" \( -name "build.gradle" -o -name "build.gradle.kts" \) -not -path "*/build/*" -type f | head -1)
              [ -n "$F" ] && PR=$(dirname "$F") && break
            done
          fi
          [ -z "$PR" ] && echo "ERROR: No project in ZIP" && exit 1
          echo "Project: $PR"
          BK=$(mktemp -d)
          cp -r .github "$BK/" 2>/dev/null || true
          find . -maxdepth 1 -not -name '.' -not -name '.git' -exec rm -rf {} + 2>/dev/null || true
          shopt -s dotglob nullglob
          cp -rf "$PR"/* ./ 2>/dev/null || true
          shopt -u dotglob nullglob
          cp -rf "$BK/.github" ./ 2>/dev/null || true
          rm -rf "$TD" "$BK"
          find . -type d -name "build" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".gradle" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          echo "Files:"
          find . -maxdepth 2 -not -path './.git/*' -not -path './.git' | sort | head -50

      - name: Auto-Fix and Upgrade Project
        run: |
          echo "========== AUTO-FIX =========="

          # ── Detect build system (Groovy vs Kotlin DSL) ──────────
          IS_KTS=false
          if [ -f build.gradle.kts ] || [ -f app/build.gradle.kts ]; then
            IS_KTS=true
          fi
          echo "Build system: $([ "$IS_KTS" = true ] && echo 'Kotlin DSL (.kts)' || echo 'Groovy DSL (.gradle)')"

          # ── Detect Gradle version ────────────────────────────────
          GRADLE_VER=""
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            GRADLE_VER=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties | grep -oP 'gradle-\K[0-9]+\.[0-9]+(\.[0-9]+)?' || true)
          fi
          echo "Current Gradle: ${GRADLE_VER:-none}"

          # ── Detect AGP version (supports both DSLs) ──────────────
          AGP_VER=""
          # Groovy style
          [ -f build.gradle ] && AGP_VER=$(grep -oP "com\.android\.tools\.build:gradle:\K[0-9]+\.[0-9]+\.[0-9]+" build.gradle || true)
          # KTS style: id("com.android.application") version "x.y.z"  OR  agp = "x.y.z" in libs.versions.toml
          [ -z "$AGP_VER" ] && [ -f libs.versions.toml ] && AGP_VER=$(grep -oP 'agp\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' libs.versions.toml || true)
          [ -z "$AGP_VER" ] && [ -f gradle/libs.versions.toml ] && AGP_VER=$(grep -oP 'agp\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' gradle/libs.versions.toml || true)
          echo "Current AGP: ${AGP_VER:-none}"

          # ── Detect language ──────────────────────────────────────
          KT=$(find . -name "*.kt" -not -path "*/build/*" -not -path "*/.gradle/*" -type f | wc -l)
          JV=$(find . -name "*.java" -not -path "*/build/*" -not -path "*/.gradle/*" -type f | wc -l)
          echo "Kotlin files: $KT, Java files: $JV"

          # ── Check if upgrade needed (only for old Groovy projects) ─
          NEED_UPGRADE=false
          G_MAJOR=0; G_MINOR=0
          if [ -n "$GRADLE_VER" ]; then
            G_MAJOR=$(echo "$GRADLE_VER" | cut -d. -f1)
            G_MINOR=$(echo "$GRADLE_VER" | cut -d. -f2)
          fi

          if [ "$IS_KTS" = false ]; then
            if [ -z "$GRADLE_VER" ] || [ "$G_MAJOR" -lt 7 ] || ([ "$G_MAJOR" -eq 7 ] && [ "$G_MINOR" -lt 3 ]); then
              NEED_UPGRADE=true
            fi
          fi

          TARGET_GRADLE="$GRADLE_VER"
          TARGET_AGP="$AGP_VER"

          if [ "$NEED_UPGRADE" = true ]; then
            echo ""
            echo ">>> UPGRADING PROJECT (Groovy DSL) <<<"
            TARGET_GRADLE="7.5.1"
            TARGET_AGP="7.4.2"
            echo "Gradle: ${GRADLE_VER:-none} -> $TARGET_GRADLE"
            mkdir -p gradle/wrapper
            printf 'distributionBase=GRADLE_USER_HOME\n' > gradle/wrapper/gradle-wrapper.properties
            printf 'distributionPath=wrapper/dists\n' >> gradle/wrapper/gradle-wrapper.properties
            printf 'distributionUrl=https\\://services.gradle.org/distributions/gradle-%s-bin.zip\n' "$TARGET_GRADLE" >> gradle/wrapper/gradle-wrapper.properties
            printf 'zipStoreBase=GRADLE_USER_HOME\n' >> gradle/wrapper/gradle-wrapper.properties
            printf 'zipStorePath=wrapper/dists\n' >> gradle/wrapper/gradle-wrapper.properties

            if [ -f build.gradle ] && grep -q "com.android.tools.build:gradle" build.gradle; then
              echo "AGP: ${AGP_VER:-none} -> $TARGET_AGP"
              sed -i "s|com\.android\.tools\.build:gradle:[0-9.]*|com.android.tools.build:gradle:${TARGET_AGP}|g" build.gradle
            fi
          fi

          # ── Add Kotlin support (Groovy DSL projects only) ─────────
          # Skip KTS projects — they already handle Kotlin via plugins {}
          if [ "$KT" -gt 0 ] && [ "$IS_KTS" = false ]; then
            echo ""
            echo ">>> KOTLIN SUPPORT (Groovy DSL) <<<"
            KOTLIN_VER="1.7.22"
            if [ -n "$TARGET_GRADLE" ]; then
              TG_MAJOR=$(echo "$TARGET_GRADLE" | cut -d. -f1)
              [ "$TG_MAJOR" -ge 8 ] && KOTLIN_VER="1.9.22"
            fi

            if [ -f build.gradle ] && ! grep -q "kotlin-gradle-plugin" build.gradle; then
              # Only modify if this is a real Groovy buildscript (has buildscript block)
              if grep -q "buildscript" build.gradle; then
                echo "Adding kotlin classpath ($KOTLIN_VER) to build.gradle"
                sed -i "/com\.android\.tools\.build:gradle/a\\        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:${KOTLIN_VER}'" build.gradle
              else
                echo "Skipping build.gradle (no buildscript block — likely a stub file)"
              fi
            fi

            if [ -f app/build.gradle ] && ! grep -q "kotlin" app/build.gradle; then
              echo "Adding kotlin plugin to app/build.gradle"
              sed -i "/id 'com.android.application'/a\\    id 'org.jetbrains.kotlin.android'" app/build.gradle
            fi

            if [ -f app/build.gradle ] && ! grep -q "kotlin-stdlib" app/build.gradle; then
              echo "Adding kotlin-stdlib"
              sed -i "/dependencies {/a\\    implementation 'org.jetbrains.kotlin:kotlin-stdlib:${KOTLIN_VER}'" app/build.gradle
            fi
          elif [ "$KT" -gt 0 ] && [ "$IS_KTS" = true ]; then
            echo ""
            echo ">>> KOTLIN SUPPORT: KTS project — no Groovy modifications needed <<<"
          fi

          # ── Parse libraries.json ──────────────────────────────────
          if [ -f app/libraries.json ] && [ -f app/build.gradle ]; then
            echo ""
            echo ">>> LIBRARIES.JSON <<<"
            python3 -c "
          import json, sys
          try:
              with open('app/libraries.json') as f:
                  libs = json.load(f)
              with open('app/build.gradle') as f:
                  bg = f.read()
              adds = []
              for lib in libs:
                  g = lib.get('groupId','')
                  a = lib.get('artifactId','')
                  v = lib.get('versionName','')
                  if g and a and v:
                      dep = f'{g}:{a}:{v}'
                      if dep not in bg and 'kotlin-stdlib' not in dep:
                          adds.append(dep)
                          print(f'  Adding: {dep}')
              if adds:
                  lines = bg.split('\n')
                  for i, line in enumerate(lines):
                      if 'dependencies {' in line:
                          for dep in reversed(adds):
                              lines.insert(i+1, f\"    implementation '{dep}'\")
                          break
                  with open('app/build.gradle','w') as f:
                      f.write('\n'.join(lines))
                  print(f'Added {len(adds)} dependencies')
              else:
                  print('No new dependencies needed')
          except Exception as e:
              print(f'Warning: {e}')
          " || echo "libraries.json parse skipped"
          fi

          # ── Parse repositories.json ───────────────────────────────
          if [ -f app/repositories.json ] && [ -f settings.gradle ]; then
            echo ""
            echo ">>> REPOSITORIES.JSON <<<"
            python3 -c "
          import json
          try:
              with open('app/repositories.json') as f:
                  repos = json.load(f)
              with open('settings.gradle') as f:
                  sg = f.read()
              for repo in repos:
                  url = repo.get('url','')
                  name = repo.get('name','')
                  if url and url not in sg and 'jitpack' in name:
                      print(f'  Adding jitpack.io')
                      sg = sg.replace('mavenCentral()', 'mavenCentral()\n        maven { url \"https://jitpack.io\" }')
              with open('settings.gradle','w') as f:
                  f.write(sg)
          except Exception as e:
              print(f'Warning: {e}')
          " || echo "repositories.json parse skipped"
          fi

          echo ""
          echo "===== FINAL build.gradle ====="
          cat build.gradle 2>/dev/null || echo "(none)"
          echo ""
          echo "===== FINAL app/build.gradle ====="
          cat app/build.gradle 2>/dev/null || echo "(none)"
          echo ""
          echo "===== FINAL build.gradle.kts ====="
          cat build.gradle.kts 2>/dev/null || echo "(none)"
          echo ""
          echo "===== FINAL settings.gradle / settings.gradle.kts ====="
          cat settings.gradle 2>/dev/null || cat settings.gradle.kts 2>/dev/null || echo "(none)"
          echo ""
          echo "===== FINAL gradle-wrapper.properties ====="
          cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "(none)"
          echo ""
          echo "========== AUTO-FIX DONE =========="

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Components
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n' > "$ANDROID_HOME/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          yes 2>/dev/null | sdkmanager --licenses > /dev/null 2>&1 || true
          CS=""
          [ -f app/build.gradle ]     && CS=$(grep -oP 'compileSdk\s*\K[0-9]+'         app/build.gradle     || true)
          [ -z "$CS" ] && [ -f app/build.gradle ]     && CS=$(grep -oP 'compileSdkVersion\s*\K[0-9]+' app/build.gradle     || true)
          [ -z "$CS" ] && [ -f app/build.gradle.kts ] && CS=$(grep -oP 'compileSdk\s*=\s*\K[0-9]+'   app/build.gradle.kts || true)
          [ -z "$CS" ] && CS="35"
          echo "Installing SDK $CS"
          sdkmanager "platforms;android-${CS}" > /dev/null 2>&1 || true
          sdkmanager "platform-tools"           > /dev/null 2>&1 || true
          LB=$(sdkmanager --list 2>/dev/null | grep -oP "build-tools;\S+" | tail -1 || true)
          [ -n "$LB" ] && sdkmanager "$LB" > /dev/null 2>&1 || true

      - name: Configure local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle Wrapper
        run: |
          # ── Determine target Gradle version ───────────────────────
          GV=""
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            GV=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties | grep -oP 'gradle-\K[0-9]+\.[0-9]+(\.[0-9]+)?' || true)
          fi
          [ -z "$GV" ] && GV="8.7"
          echo "Target Gradle version: $GV"

          # ── Validate existing wrapper JAR integrity ────────────────
          # A corrupted JAR from a ZIP upload causes: ClassFormatError: Code segment has wrong length
          # We check integrity BEFORE trusting the existing files.
          JAR_VALID=false
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            JAR_SIZE=$(stat -c%s gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo 0)
            echo "Wrapper JAR size: ${JAR_SIZE} bytes"

            # A valid gradle-wrapper.jar is always > 50 KB
            if [ "$JAR_SIZE" -gt 51200 ]; then
              # Also verify it's a valid ZIP/JAR (JARs are ZIP files)
              if unzip -t gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
                JAR_VALID=true
                echo "Wrapper JAR: integrity OK"
              else
                echo "Wrapper JAR: ZIP structure corrupted — will regenerate"
              fi
            else
              echo "Wrapper JAR: suspiciously small (${JAR_SIZE}B) — will regenerate"
            fi
          else
            echo "Wrapper JAR: missing — will create"
          fi

          # ── Use existing wrapper or regenerate ────────────────────
          if [ -f gradlew ] && [ "$JAR_VALID" = true ]; then
            chmod +x gradlew
            echo "gradlew: using existing (JAR validated)"
          else
            echo "Creating/repairing Gradle wrapper (v$GV)..."

            # Strategy 1: Download the official wrapper JAR directly
            # (much faster than downloading the full Gradle distribution)
            WRAPPER_VER="$GV"
            # Map Gradle version to known wrapper JAR download
            # Gradle publishes the wrapper jar at their GitHub releases
            mkdir -p gradle/wrapper
            wget -q --timeout=30 \
              "https://github.com/gradle/gradle/raw/v${GV}/gradle/wrapper/gradle-wrapper.jar" \
              -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true

            # Validate the downloaded JAR
            if [ -f gradle/wrapper/gradle-wrapper.jar ] && \
               [ "$(stat -c%s gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo 0)" -gt 51200 ] && \
               unzip -t gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
              echo "Strategy 1 succeeded: wrapper JAR downloaded from GitHub"
              JAR_VALID=true
            else
              echo "Strategy 1 failed — falling back to full Gradle distribution"
              # Strategy 2: Download full Gradle and run 'gradle wrapper'
              wget -q --timeout=120 \
                "https://services.gradle.org/distributions/gradle-${GV}-bin.zip" \
                -O /tmp/g.zip 2>/dev/null || \
              wget -q --timeout=120 \
                "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
                -O /tmp/g.zip
              unzip -q /tmp/g.zip -d /tmp/gi
              /tmp/gi/gradle-*/bin/gradle wrapper \
                --gradle-version="$GV" \
                --no-daemon \
                2>&1 | tail -10 || true
              rm -rf /tmp/g.zip /tmp/gi
            fi

            # Make gradlew executable
            chmod +x gradlew 2>/dev/null || true

            # Ensure wrapper properties still points to the right version
            if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
              CURRENT_URL=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties || true)
              echo "Wrapper properties: $CURRENT_URL"
            fi
          fi

          # ── Final sanity checks ────────────────────────────────────
          echo ""
          echo "Wrapper sanity check:"
          if [ -f gradlew ]; then
            echo "  OK: gradlew ($(stat -c%s gradlew)B)"
          else
            echo "  ERROR: gradlew missing!"
            exit 1
          fi
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "  OK: wrapper.jar ($(stat -c%s gradle/wrapper/gradle-wrapper.jar)B)"
          else
            echo "  ERROR: wrapper.jar missing!"
            exit 1
          fi
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            echo "  OK: wrapper.properties"
          else
            echo "  ERROR: wrapper.properties missing!"
            exit 1
          fi

          # ── Quick smoke test of the wrapper ───────────────────────
          echo ""
          echo "Running wrapper smoke test..."
          if timeout 30 ./gradlew --version --no-daemon 2>&1 | grep -q "Gradle"; then
            echo "  Wrapper smoke test: PASSED"
          else
            echo "  Wrapper smoke test: FAILED — check logs above"
            exit 1
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          echo "===== BUILDING DEBUG APK ====="
          if ./gradlew assembleDebug \
              --no-daemon \
              --stacktrace \
              -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"; then
            echo "BUILD SUCCESSFUL"
          else
            echo "First attempt failed — retrying with clean caches..."
            ./gradlew assembleDebug \
              --no-daemon \
              --stacktrace \
              --no-build-cache \
              --refresh-dependencies \
              -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
            echo "BUILD SUCCESSFUL (retry)"
          fi

          echo ""
          echo "APK files:"
          find . -name "*.apk" -not -path "*/intermediates/*" -type f | while read f; do
            echo "  $(basename "$f") ($(du -sh "$f" | cut -f1))"
          done

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "APK-build${{ github.run_number }}"
          path: |
            **/build/outputs/apk/**/*.apk
            !**/intermediates/**
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "Reports-build${{ github.run_number }}"
          path: "**/build/reports/**"
          if-no-files-found: ignore
          retention-days: 7
