name: Build Android APK

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_TOOL_OPTIONS: "-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP if exists
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" -type f | head -1)
          [ -z "$ZIP" ] && echo "No ZIP" && exit 0
          echo "Extracting $ZIP"
          TD=$(mktemp -d)
          unzip -q -o "$ZIP" -d "$TD"
          PR=""
          for d in $(seq 0 5); do
            F=$(find "$TD" -mindepth "$d" -maxdepth "$d" \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -not -path "*/build/*" -type f | head -1)
            [ -n "$F" ] && PR=$(dirname "$F") && break
          done
          if [ -z "$PR" ]; then
            for d in $(seq 0 5); do
              F=$(find "$TD" -mindepth "$d" -maxdepth "$d" \( -name "build.gradle" -o -name "build.gradle.kts" \) -not -path "*/build/*" -type f | head -1)
              [ -n "$F" ] && PR=$(dirname "$F") && break
            done
          fi
          [ -z "$PR" ] && echo "ERROR: No project found in ZIP" && exit 1
          echo "Project root: $PR"
          BK=$(mktemp -d)
          cp -r .github "$BK/" 2>/dev/null || true
          find . -maxdepth 1 -not -name '.' -not -name '.git' -exec rm -rf {} + 2>/dev/null || true
          shopt -s dotglob nullglob
          cp -rf "$PR"/* ./ 2>/dev/null || true
          shopt -u dotglob nullglob
          cp -rf "$BK/.github" ./ 2>/dev/null || true
          rm -rf "$TD" "$BK"
          find . -type d -name "build"   -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".gradle" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          echo "Project files:"; find . -maxdepth 2 -not -path './.git/*' | sort | head -50

      - name: Auto-Fix Project
        run: |
          echo "=== AUTO-FIX ==="
          IS_KTS=false
          [ -f build.gradle.kts ] || [ -f app/build.gradle.kts ] && IS_KTS=true
          echo "DSL: $([ "$IS_KTS" = true ] && echo KTS || echo Groovy)"

          GRADLE_VER=""
          [ -f gradle/wrapper/gradle-wrapper.properties ] && \
            GRADLE_VER=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties \
              | grep -oP 'gradle-\K[0-9]+\.[0-9]+(\.[0-9]+)?' || true)
          echo "Gradle: ${GRADLE_VER:-none}"

          KT=$(find . -name "*.kt" -not -path "*/build/*" -type f | wc -l)
          echo "Kotlin files: $KT"

          G_MAJOR=0; G_MINOR=0
          [ -n "$GRADLE_VER" ] && G_MAJOR=$(echo "$GRADLE_VER"|cut -d. -f1) && G_MINOR=$(echo "$GRADLE_VER"|cut -d. -f2)
          NEED_UPGRADE=false
          if [ "$IS_KTS" = false ]; then
            { [ -z "$GRADLE_VER" ] || [ "$G_MAJOR" -lt 7 ] || { [ "$G_MAJOR" -eq 7 ] && [ "$G_MINOR" -lt 3 ]; }; } && NEED_UPGRADE=true
          fi

          if [ "$NEED_UPGRADE" = true ]; then
            echo "Upgrading Groovy project to Gradle 7.5.1 / AGP 7.4.2"
            mkdir -p gradle/wrapper
            printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-7.5.1-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
            [ -f build.gradle ] && sed -i "s|com\.android\.tools\.build:gradle:[0-9.]*|com.android.tools.build:gradle:7.4.2|g" build.gradle
            GRADLE_VER="7.5.1"
          fi

          if [ "$KT" -gt 0 ] && [ "$IS_KTS" = false ] && [ -f build.gradle ] && grep -q "buildscript" build.gradle; then
            grep -q "kotlin-gradle-plugin" build.gradle || \
              sed -i "/com\.android\.tools\.build:gradle/a\\        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'" build.gradle
          fi

          echo "=== gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "(none)"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Components
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n' > "$ANDROID_HOME/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          CS=""
          [ -f app/build.gradle ]     && CS=$(grep -oP 'compileSdk\s*\K[0-9]+'       app/build.gradle     || true)
          [ -z "$CS" ] && [ -f app/build.gradle.kts ] && CS=$(grep -oP 'compileSdk\s*=\s*\K[0-9]+' app/build.gradle.kts || true)
          [ -z "$CS" ] && CS="35"
          echo "Installing SDK $CS"
          sdkmanager "platforms;android-${CS}" "platform-tools" > /dev/null 2>&1 || true
          LB=$(sdkmanager --list 2>/dev/null | grep -oP "build-tools;\S+" | tail -1 || true)
          [ -n "$LB" ] && sdkmanager "$LB" > /dev/null 2>&1 || true

      - name: Configure local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ═══════════════════════════════════════════════════════════════
      # GRADLE WRAPPER — DEFINITIVE FIX
      # Root cause: gradle-wrapper.jar inside the uploaded ZIP is always
      # a 592-byte placeholder (corrupted). Previous fixes failed because:
      #   1. GitHub raw URLs don't serve binary JARs directly
      #   2. Running "gradle wrapper" in the project directory reads
      #      libs.versions.toml → too_many_import_invocation → 0-byte JAR
      #   3. Smoke test used "grep -q Gradle" which matched error messages
      #
      # THE FIX: Generate the JAR by running "gradle wrapper" in a
      # completely isolated temp project (no libs.versions.toml, no
      # build.gradle.kts, nothing). Then copy the result.
      # ═══════════════════════════════════════════════════════════════
      - name: Setup Gradle Wrapper
        run: |
          # ── Read version from project ─────────────────────────────
          GV=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties 2>/dev/null \
               | grep -oP 'gradle-\K[0-9]+\.[0-9]+(\.[0-9]+)?' || echo "8.7")
          echo "Need Gradle: $GV"

          # ── Check existing JAR ────────────────────────────────────
          JAR_OK=false
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            SZ=$(stat -c%s gradle/wrapper/gradle-wrapper.jar)
            echo "Existing JAR: ${SZ} bytes"
            if [ "$SZ" -gt 30000 ] && unzip -t gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
              JAR_OK=true
              echo "Existing JAR: valid ✓"
            else
              echo "Existing JAR: INVALID — will regenerate"
            fi
          else
            echo "No existing JAR — will generate"
          fi

          # ── Regenerate if needed ──────────────────────────────────
          if [ "$JAR_OK" = false ]; then
            echo "Downloading Gradle ${GV} distribution..."
            wget -q --timeout=180 \
              "https://services.gradle.org/distributions/gradle-${GV}-bin.zip" \
              -O /tmp/gradle_dist.zip \
            || wget -q --timeout=180 \
              "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
              -O /tmp/gradle_dist.zip
            echo "Distribution downloaded: $(stat -c%s /tmp/gradle_dist.zip) bytes"
            unzip -q /tmp/gradle_dist.zip -d /tmp/gradle_home

            # Find the gradle binary
            GRADLE_BIN=$(find /tmp/gradle_home -name "gradle" -type f | head -1)
            chmod +x "$GRADLE_BIN"
            echo "Gradle binary: $GRADLE_BIN"

            # ── CRITICAL: run in a CLEAN ISOLATED temp project ───────
            # DO NOT run inside the user's project — libs.versions.toml
            # causes "too_many_import_invocation" → 0-byte JAR
            TMPPROJ=$(mktemp -d)
            echo 'rootProject.name = "bootstrap"' > "$TMPPROJ/settings.gradle"

            echo "Generating wrapper JAR in isolated project..."
            "$GRADLE_BIN" wrapper \
              --gradle-version="$GV" \
              --project-dir="$TMPPROJ" \
              --no-daemon \
              2>&1 | tail -5

            GENERATED_JAR="$TMPPROJ/gradle/wrapper/gradle-wrapper.jar"
            GENERATED_SZ=$(stat -c%s "$GENERATED_JAR" 2>/dev/null || echo 0)
            echo "Generated JAR size: ${GENERATED_SZ} bytes"

            if [ "$GENERATED_SZ" -gt 30000 ]; then
              mkdir -p gradle/wrapper
              cp "$GENERATED_JAR" gradle/wrapper/gradle-wrapper.jar
              echo "Wrapper JAR installed: $(stat -c%s gradle/wrapper/gradle-wrapper.jar) bytes ✓"
            else
              echo "ERROR: Generated JAR is invalid (${GENERATED_SZ}B)"
              ls -la "$TMPPROJ/gradle/wrapper/" 2>/dev/null || echo "(dir empty)"
              exit 1
            fi

            rm -rf "$TMPPROJ" /tmp/gradle_dist.zip /tmp/gradle_home
          fi

          # ── Ensure gradlew is executable ──────────────────────────
          chmod +x gradlew

          # ── Smoke test — must match "^Gradle X.Y" at line start ──
          # NOTE: "grep -q Gradle" is WRONG — it matches error messages
          # like "org.gradle.wrapper.GradleWrapperMain" → false positive!
          echo "Running smoke test..."
          SMOKE=$(timeout 60 ./gradlew --version --no-daemon 2>&1 || true)
          if echo "$SMOKE" | grep -qP "^Gradle [0-9]"; then
            echo "Smoke test: PASSED ✓"
            echo "$SMOKE" | grep -P "^Gradle" | head -1
          else
            echo "Smoke test: FAILED ✗"
            echo "--- Output ---"
            echo "$SMOKE"
            echo "--------------"
            exit 1
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          echo "=== BUILDING ==="
          # JAVA_TOOL_OPTIONS env var handles memory — do NOT pass -Dorg.gradle.jvmargs
          # on the command line: shell strips quotes → Gradle gets -Xmx4g as its own
          # flag → "Unknown command-line option '-X'"
          ./gradlew assembleDebug --no-daemon --stacktrace \
          && echo "BUILD SUCCESSFUL ✓" \
          || {
            echo "First attempt failed — retrying clean..."
            ./gradlew assembleDebug --no-daemon --stacktrace --no-build-cache --refresh-dependencies
            echo "BUILD SUCCESSFUL ✓ (retry)"
          }
          echo "APK files:"
          find . -name "*.apk" -not -path "*/intermediates/*" -type f \
            | while read f; do echo "  $(basename "$f") ($(du -sh "$f"|cut -f1))"; done

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "APK-build${{ github.run_number }}"
          path: |
            **/build/outputs/apk/**/*.apk
            !**/intermediates/**
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "Reports-build${{ github.run_number }}"
          path: "**/build/reports/**"
          if-no-files-found: ignore
          retention-days: 7
