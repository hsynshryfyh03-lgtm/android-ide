name: 🤖 Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ✅ استخراج ZIP تلقائياً إذا كانت الملفات مضغوطة
      - name: 📦 Extract project ZIP if present
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Found ZIP: $ZIP — extracting..."
            unzip -q "$ZIP" -d /tmp/extracted
          fi

          # ابحث عن app/build.gradle في أي مكان
          PROJ=$(find . /tmp/extracted -name "build.gradle" -path "*/app/build.gradle" 2>/dev/null \
                 | head -1 | xargs -I{} dirname {} | xargs -I{} dirname {})

          echo "Project root: $PROJ"

          # انقل كل شيء للـ workspace إذا كانت في مجلد فرعي
          if [ "$PROJ" != "." ] && [ -n "$PROJ" ]; then
            cp -r "$PROJ/." .
          fi

          echo "=== Files at root ==="
          ls -la
          echo "=== app/ exists? ==="
          ls app/ 2>/dev/null || echo "app/ NOT found"

      - name: ☕ JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: 🔐 Generate debug keystore
        run: |
          mkdir -p app
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore app/debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000 \
            -keyalg RSA -keysize 2048 -noprompt
          echo "✓ Keystore ready"

      - name: 🔨 Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: 📦 Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Debug-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Release-build${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 🚀 Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }}"
          body: |
            📱 AndroidIDE APK — Build #${{ github.run_number }}
            📝 ${{ github.event.head_commit.message }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
