# ╔════════════════════════════════════════════════════════════════════╗
# ║  🚀 Android APK Universal Smart Builder  v4.0                     ║
# ║                                                                    ║
# ║  يعمل مع أي مشروع Android بدون تعديل:                            ║
# ║  ✅ Java / Kotlin / مختلط                                         ║
# ║  ✅ Groovy DSL / Kotlin DSL                                       ║
# ║  ✅ أي إصدار Gradle (يُرقّي القديم تلقائياً)                       ║
# ║  ✅ أي إصدار AGP (يُرقّي تلقائياً)                                ║
# ║  ✅ يضيف Kotlin plugin تلقائياً إن لزم                            ║
# ║  ✅ يكشف compileSdk / minSdk / targetSdk                         ║
# ║  ✅ يدعم NDK / CMake                                              ║
# ║  ✅ يدعم ZIP أو ملفات مباشرة                                      ║
# ║  ✅ يدعم مشاريع Android Studio / CodeAssist / Sketchware          ║
# ║  ✅ يبني debug / release / كليهما                                  ║
# ║  ✅ يدعم التوقيع التلقائي                                          ║
# ╚════════════════════════════════════════════════════════════════════╝

name: 🚀 Android APK Builder

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء | Build Type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both
      java_version:
        description: 'إصدار Java (auto = تلقائي)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - '11'
          - '17'
          - '21'

permissions:
  contents: read

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configuration-cache=false
  JAVA_TOOL_OPTIONS: >-
    -Xmx4g -XX:MaxMetaspaceSize=1g
    -XX:+HeapDumpOnOutOfMemoryError

jobs:
  build:
    name: 🔨 Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      # ╭──────────────────────────────────────╮
      # │  📥 STEP 1: Checkout Repository      │
      # ╰──────────────────────────────────────╯
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ╭──────────────────────────────────────╮
      # │  📦 STEP 2: Smart ZIP Extraction     │
      # ╰──────────────────────────────────────╯
      - name: 📦 Detect & Extract Project from ZIP
        id: extract
        run: |
          set -eo pipefail

          echo "╔══════════════════════════════════════════╗"
          echo "║  📦 Smart ZIP Detection & Extraction     ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          # ── البحث عن ملفات ZIP ──
          mapfile -t ZIP_FILES < <(find . -maxdepth 1 -name "*.zip" -type f 2>/dev/null | sort)

          if [ ${#ZIP_FILES[@]} -eq 0 ]; then
            echo "📂 لا يوجد ملف ZIP - استخدام ملفات المشروع مباشرة"
            echo "has_zip=false" >> "$GITHUB_OUTPUT"

            if find . -maxdepth 1 \( -name "settings.gradle*" -o -name "build.gradle*" \) \
               -type f 2>/dev/null | grep -q .; then
              echo "✅ مشروع Android موجود"
            else
              echo "❌ لا يوجد مشروع! ارفع ZIP أو ملفات المشروع"
              exit 1
            fi
            exit 0
          fi

          echo "has_zip=true" >> "$GITHUB_OUTPUT"
          ZIP_FILE="${ZIP_FILES[0]}"
          echo "📦 تم العثور على: $ZIP_FILE ($(du -sh "$ZIP_FILE" | cut -f1))"

          # فك الضغط
          EXTRACT_DIR=$(mktemp -d)
          echo "📂 جاري فك الضغط..."
          unzip -q -o "$ZIP_FILE" -d "$EXTRACT_DIR"

          # البحث الذكي عن جذر المشروع (5 مستويات)
          echo "🔍 البحث عن جذر المشروع..."
          PROJECT_ROOT=""

          # أولوية 1: settings.gradle
          for depth in $(seq 0 5); do
            FOUND=$(find "$EXTRACT_DIR" -mindepth "$depth" -maxdepth "$depth" \
              \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
              -not -path "*/build/*" -type f 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              PROJECT_ROOT=$(dirname "$FOUND")
              echo "  ✅ settings.gradle في العمق $depth"
              break
            fi
          done

          # أولوية 2: build.gradle + app/
          if [ -z "$PROJECT_ROOT" ]; then
            for depth in $(seq 0 5); do
              while IFS= read -r bf; do
                DIR=$(dirname "$bf")
                if [ -d "$DIR/app" ]; then
                  PROJECT_ROOT="$DIR"
                  echo "  ✅ build.gradle + app/ في العمق $depth"
                  break 2
                fi
              done < <(find "$EXTRACT_DIR" -mindepth "$depth" -maxdepth "$depth" \
                \( -name "build.gradle" -o -name "build.gradle.kts" \) \
                -not -path "*/build/*" -type f 2>/dev/null)
            done
          fi

          # أولوية 3: أي build.gradle
          if [ -z "$PROJECT_ROOT" ]; then
            for depth in $(seq 0 5); do
              FOUND=$(find "$EXTRACT_DIR" -mindepth "$depth" -maxdepth "$depth" \
                \( -name "build.gradle" -o -name "build.gradle.kts" \) \
                -not -path "*/build/*" -type f 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                PROJECT_ROOT=$(dirname "$FOUND")
                echo "  ✅ build.gradle في العمق $depth"
                break
              fi
            done
          fi

          if [ -z "$PROJECT_ROOT" ]; then
            echo "❌ لم يتم العثور على مشروع Gradle!"
            echo "📁 محتويات ZIP:"
            find "$EXTRACT_DIR" -maxdepth 4 -type f | head -40
            rm -rf "$EXTRACT_DIR"
            exit 1
          fi

          echo "📁 جذر المشروع: $PROJECT_ROOT"

          # نسخ ملفات المشروع مع حفظ .github
          GITHUB_BACKUP=$(mktemp -d)
          cp -r .github "$GITHUB_BACKUP/" 2>/dev/null || true
          find . -maxdepth 1 -not -name '.' -not -name '.git' -exec rm -rf {} + 2>/dev/null || true

          shopt -s dotglob nullglob
          cp -rf "$PROJECT_ROOT"/* ./ 2>/dev/null || true
          find "$PROJECT_ROOT" -maxdepth 1 -name ".*" \
            -not -name "." -not -name ".." -not -name ".git" \
            -exec cp -rf {} ./ \; 2>/dev/null || true
          shopt -u dotglob nullglob

          cp -rf "$GITHUB_BACKUP/.github" ./ 2>/dev/null || true
          rm -rf "$EXTRACT_DIR" "$GITHUB_BACKUP"

          # تنظيف مجلدات البناء السابقة
          echo "🧹 تنظيف ملفات البناء القديمة..."
          find . -type d -name "build" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".gradle" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true

          echo ""
          echo "📋 هيكل المشروع:"
          find . -maxdepth 2 -not -path './.git/*' -not -path './.git' \
            -not -path './build/*' | sort | head -50
          echo ""

      # ╭──────────────────────────────────────╮
      # │  🔍 STEP 3: Detect & Auto-Upgrade    │
      # ╰──────────────────────────────────────╯
      - name: 🔍 Detect Configuration & Auto-Upgrade
        id: config
        shell: bash
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  🔍 Detection & Auto-Upgrade Engine      ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          # ───────────────────────────────────
          # دالة بحث آمنة في ملفات Gradle
          # ───────────────────────────────────
          safe_grep() {
            grep -rh "$@" \
              --include="*.gradle" \
              --include="*.gradle.kts" \
              --exclude-dir=build \
              --exclude-dir=.gradle \
              . 2>/dev/null || echo ""
          }

          GRADLE_CONTENT=$(safe_grep "")

          # ═══════════════════════════════════
          # 🔤 كشف لغة البرمجة
          # ═══════════════════════════════════
          KT=$(find . -name "*.kt" -not -path "*/build/*" -not -path "*/.gradle/*" -type f 2>/dev/null | wc -l || echo "0")
          JV=$(find . -name "*.java" -not -path "*/build/*" -not -path "*/.gradle/*" -not -path "*/generated/*" -type f 2>/dev/null | wc -l || echo "0")

          if [ "$KT" -gt 0 ] && [ "$JV" -gt 0 ]; then
            LANG="kotlin+java"; echo "🟣🟠 لغة: Kotlin ($KT) + Java ($JV)"
          elif [ "$KT" -gt 0 ]; then
            LANG="kotlin"; echo "🟣 لغة: Kotlin ($KT ملف)"
          elif [ "$JV" -gt 0 ]; then
            LANG="java"; echo "🟠 لغة: Java ($JV ملف)"
          else
            LANG="unknown"; echo "⚪ لم يتم كشف ملفات مصدرية"
          fi
          echo "language=$LANG" >> "$GITHUB_OUTPUT"

          # ═══════════════════════════════════
          # 📝 كشف DSL
          # ═══════════════════════════════════
          if [ -f "build.gradle.kts" ] || [ -f "settings.gradle.kts" ]; then
            DSL="kotlin"; echo "📝 DSL: Kotlin Script (.kts)"
          else
            DSL="groovy"; echo "📝 DSL: Groovy"
          fi
          echo "dsl=$DSL" >> "$GITHUB_OUTPUT"

          # ═══════════════════════════════════
          # 📦 كشف Gradle و AGP
          # ═══════════════════════════════════
          GRADLE_VER=""
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            GRADLE_VER=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties 2>/dev/null \
              | grep -oP 'gradle-\K[0-9]+\.[0-9]+(\.[0-9]+)?' || echo "")
          fi
          [ -z "$GRADLE_VER" ] && GRADLE_VER="8.7"
          echo "📦 Gradle: $GRADLE_VER"

          AGP_VER=""
          # بحث في root build.gradle
          if [ -f "build.gradle" ]; then
            AGP_VER=$(grep -oP "com\.android\.tools\.build:gradle:\K[0-9]+\.[0-9]+\.[0-9]+" build.gradle 2>/dev/null || echo "")
          fi
          # بحث بديل في build.gradle.kts
          if [ -z "$AGP_VER" ] && [ -f "build.gradle.kts" ]; then
            AGP_VER=$(grep -oP 'com\.android\.tools\.build:gradle:\K[0-9]+\.[0-9]+\.[0-9]+' build.gradle.kts 2>/dev/null || echo "")
          fi
          # بحث بديل: id("com.android.application") version
          if [ -z "$AGP_VER" ]; then
            AGP_VER=$(echo "$GRADLE_CONTENT" | grep -oP "com\.android\.(application|library).*version.*\K[0-9]+\.[0-9]+\.[0-9]+" 2>/dev/null | head -1 || echo "")
          fi
          echo "🤖 AGP: ${AGP_VER:-غير محدد}"

          G_MAJOR=$(echo "$GRADLE_VER" | cut -d. -f1)
          G_MINOR=$(echo "$GRADLE_VER" | cut -d. -f2)

          # ═══════════════════════════════════
          # 🔄 ترقية تلقائية إن لزم
          # ═══════════════════════════════════
          NEEDS_UPGRADE=false

          # JDK 17 مطلوب لـ sdkmanager الحديث
          # Gradle < 7.3 لا يدعم JDK 17
          if [ "$G_MAJOR" -lt 7 ] || ([ "$G_MAJOR" -eq 7 ] && [ "$G_MINOR" -lt 3 ]); then
            NEEDS_UPGRADE=true
            echo ""
            echo "⚠️  Gradle $GRADLE_VER قديم (لا يدعم JDK 17)"
          fi

          if [ "$NEEDS_UPGRADE" = true ]; then
            echo ""
            echo "╔══════════════════════════════════════════╗"
            echo "║  🔄 ترقية تلقائية للتوافق               ║"
            echo "╚══════════════════════════════════════════╝"
            echo ""

            # ── اختيار إصدارات الترقية ──
            # AGP 7.4.2 ← متوافق مع Gradle 7.5.x + JDK 17 + compileSdk 31-33
            # AGP 8.1.4 ← أحدث لكن يحتاج Gradle 8.x
            # الأفضل للمشاريع القديمة: 7.4.2 + 7.5.1
            NEW_GRADLE="7.5.1"
            NEW_AGP="7.4.2"
            NEW_KOTLIN="1.7.22"

            # ── ترقية Gradle Wrapper ──
            echo "  📦 Gradle: $GRADLE_VER → $NEW_GRADLE"
            mkdir -p gradle/wrapper
            cat > gradle/wrapper/gradle-wrapper.properties << GWRAP
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-${NEW_GRADLE}-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
GWRAP
            GRADLE_VER="$NEW_GRADLE"

            # ── ترقية AGP في root build.gradle ──
            if [ -f "build.gradle" ] && grep -q "com.android.tools.build:gradle" build.gradle; then
              echo "  🤖 AGP: ${AGP_VER:-?} → $NEW_AGP"
              sed -i "s|com\.android\.tools\.build:gradle:[0-9.]*|com.android.tools.build:gradle:${NEW_AGP}|g" build.gradle
              AGP_VER="$NEW_AGP"
            fi

            # ── إضافة Kotlin إن لزم ──
            if [ "$KT" -gt 0 ]; then
              echo "  🟣 ملفات Kotlin موجودة ($KT ملف)"

              # إضافة kotlin classpath
              if [ -f "build.gradle" ] && ! grep -q "kotlin-gradle-plugin" build.gradle; then
                echo "    → إضافة Kotlin classpath ($NEW_KOTLIN)"
                sed -i "/com\.android\.tools\.build:gradle/a\\        classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:${NEW_KOTLIN}\"" build.gradle
              fi

              # إضافة kotlin plugin في app/build.gradle
              if [ -f "app/build.gradle" ] && ! grep -q "kotlin" app/build.gradle; then
                echo "    → إضافة Kotlin plugin"
                sed -i "/id 'com.android.application'/a\\    id 'org.jetbrains.kotlin.android'" app/build.gradle
              fi

              # إضافة kotlinOptions
              if [ -f "app/build.gradle" ] && ! grep -q "kotlinOptions" app/build.gradle; then
                echo "    → إضافة kotlinOptions"
                # إضافة بعد compileOptions block
                sed -i '/^    }$/{ 
                  N
                  /compileOptions/!b
                  :again
                  /^    }/!{N;b again}
                  a\    kotlinOptions {\n        jvmTarget = "1.8"\n    }
                }' app/build.gradle 2>/dev/null || true
                
                # طريقة بديلة أبسط إن فشلت الأولى
                if ! grep -q "kotlinOptions" app/build.gradle; then
                  sed -i '/android {/,/^}/ { /compileOptions/,/}/ { /}/a\    kotlinOptions {\n        jvmTarget = "1.8"\n    }
                  } }' app/build.gradle 2>/dev/null || true
                fi
              fi

              # إضافة kotlin-stdlib في dependencies
              if [ -f "app/build.gradle" ] && ! grep -q "kotlin-stdlib" app/build.gradle; then
                echo "    → إضافة kotlin-stdlib"
                sed -i "/dependencies {/a\\    implementation \"org.jetbrains.kotlin:kotlin-stdlib:${NEW_KOTLIN}\"" app/build.gradle
              fi
            fi

            echo ""
            echo "  ════════════════════════════════════"
            echo "  📋 build.gradle (root) بعد الترقية:"
            echo "  ════════════════════════════════════"
            cat build.gradle
            echo ""
            echo "  ════════════════════════════════════"
            echo "  📋 app/build.gradle بعد الترقية:"
            echo "  ════════════════════════════════════"
            cat app/build.gradle
            echo ""
            echo "  ✅ اكتملت الترقية!"
            echo ""
          fi

          # تحديث G_MAJOR و G_MINOR بعد الترقية
          G_MAJOR=$(echo "$GRADLE_VER" | cut -d. -f1)
          G_MINOR=$(echo "$GRADLE_VER" | cut -d. -f2)

          # ═══════════════════════════════════
          # ☕ اختيار JDK
          # ═══════════════════════════════════
          INPUT_JDK="${{ github.event.inputs.java_version }}"

          if [ -n "$INPUT_JDK" ] && [ "$INPUT_JDK" != "auto" ]; then
            JDK="$INPUT_JDK"
            echo "☕ JDK (يدوي): $JDK"
          else
            # حساب أقصى JDK يدعمه Gradle
            MAX_JDK=21
            if [ "$G_MAJOR" -lt 7 ]; then MAX_JDK=11
            elif [ "$G_MAJOR" -eq 7 ]; then
              if [ "$G_MINOR" -lt 3 ]; then MAX_JDK=16
              elif [ "$G_MINOR" -lt 5 ]; then MAX_JDK=17
              else MAX_JDK=18; fi
            elif [ "$G_MAJOR" -eq 8 ]; then
              if [ "$G_MINOR" -lt 5 ]; then MAX_JDK=20
              else MAX_JDK=21; fi
            fi

            # JDK 17 هو الأفضل للمشاريع الحديثة + مطلوب لـ sdkmanager
            if [ "$MAX_JDK" -ge 17 ]; then
              JDK=17
            elif [ "$MAX_JDK" -ge 11 ]; then
              JDK=11
            else
              JDK=11
            fi

            echo "☕ JDK (تلقائي): $JDK (حد Gradle: $MAX_JDK)"
          fi
          echo "jdk_version=$JDK" >> "$GITHUB_OUTPUT"
          echo "gradle_version=$GRADLE_VER" >> "$GITHUB_OUTPUT"

          # ═══════════════════════════════════
          # 🤖 كشف SDK
          # ═══════════════════════════════════
          COMPILE_SDK=""
          if [ -f "gradle/libs.versions.toml" ]; then
            COMPILE_SDK=$(grep -iP "^\s*(compileSdk|compile-sdk|android-compile)" \
              gradle/libs.versions.toml 2>/dev/null | grep -oP '[0-9]+' | head -1 || echo "")
          fi
          if [ -z "$COMPILE_SDK" ]; then
            RAW=$(echo "$GRADLE_CONTENT" | grep -i "compileSdk\|compileSdkVersion" || echo "")
            [ -n "$RAW" ] && COMPILE_SDK=$(echo "$RAW" | grep -v '^\s*//' | grep -oP '[0-9]{2,}' | sort -rn | head -1 || echo "")
          fi
          [ -z "$COMPILE_SDK" ] && COMPILE_SDK="35"

          TARGET_SDK=""
          RAW=$(echo "$GRADLE_CONTENT" | grep -iE "targetSdk[^V]|targetSdkVersion" || echo "")
          [ -n "$RAW" ] && TARGET_SDK=$(echo "$RAW" | grep -v '^\s*//' | grep -oP '[0-9]{2,}' | sort -rn | head -1 || echo "")
          [ -z "$TARGET_SDK" ] && TARGET_SDK="$COMPILE_SDK"

          MIN_SDK=""
          RAW=$(echo "$GRADLE_CONTENT" | grep -iE "minSdk[^V]|minSdkVersion" || echo "")
          [ -n "$RAW" ] && MIN_SDK=$(echo "$RAW" | grep -v '^\s*//' | grep -oP '[0-9]+' | sort -n | head -1 || echo "")
          [ -z "$MIN_SDK" ] && MIN_SDK="21"

          BUILD_TOOLS=""
          RAW=$(echo "$GRADLE_CONTENT" | grep -i "buildToolsVersion" || echo "")
          [ -n "$RAW" ] && BUILD_TOOLS=$(echo "$RAW" | grep -oP '"[^"]*"' | tr -d '"' | head -1 || echo "")

          echo "compile_sdk=$COMPILE_SDK" >> "$GITHUB_OUTPUT"
          echo "target_sdk=$TARGET_SDK" >> "$GITHUB_OUTPUT"
          echo "min_sdk=$MIN_SDK" >> "$GITHUB_OUTPUT"
          echo "build_tools=$BUILD_TOOLS" >> "$GITHUB_OUTPUT"

          echo "🤖 Compile SDK: $COMPILE_SDK"
          echo "🎯 Target SDK:  $TARGET_SDK"
          echo "📱 Min SDK:     $MIN_SDK"
          [ -n "$BUILD_TOOLS" ] && echo "🔧 Build Tools: $BUILD_TOOLS" || echo "🔧 Build Tools: تلقائي"

          # ═══════════════════════════════════
          # 🔧 NDK / CMake
          # ═══════════════════════════════════
          NDK_VER=""
          RAW=$(echo "$GRADLE_CONTENT" | grep -i "ndkVersion" || echo "")
          [ -n "$RAW" ] && NDK_VER=$(echo "$RAW" | grep -oP '"[^"]*"' | tr -d '"' | head -1 || echo "")

          CMAKE_VER=""
          RAW=$(echo "$GRADLE_CONTENT" | grep -i "cmake" || echo "")
          [ -n "$RAW" ] && CMAKE_VER=$(echo "$RAW" | grep -oP 'version\s*"?\K[0-9][0-9.]*' | head -1 || echo "")

          echo "ndk_version=$NDK_VER" >> "$GITHUB_OUTPUT"
          echo "cmake_version=$CMAKE_VER" >> "$GITHUB_OUTPUT"

          [ -n "$NDK_VER" ] && echo "🔧 NDK: $NDK_VER" || echo "🔧 NDK: غير مستخدم"
          [ -n "$CMAKE_VER" ] && echo "🔧 CMake: $CMAKE_VER" || echo "🔧 CMake: غير مستخدم"

          # App ID
          APP_ID=""
          RAW=$(echo "$GRADLE_CONTENT" | grep -i "applicationId" || echo "")
          [ -n "$RAW" ] && APP_ID=$(echo "$RAW" | grep -oP '"[^"]*"' | tr -d '"' | head -1 || echo "")
          [ -n "$APP_ID" ] && echo "📱 App ID: $APP_ID"

          echo ""
          echo "══════════════════════════════════════════"
          echo "✅ اكتمل الكشف التلقائي"

      # ╭──────────────────────────────────────╮
      # │  ☕ STEP 4: Setup JDK                │
      # ╰──────────────────────────────────────╯
      - name: ☕ Setup JDK ${{ steps.config.outputs.jdk_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.config.outputs.jdk_version }}
          distribution: 'temurin'

      # ╭──────────────────────────────────────╮
      # │  🤖 STEP 5: Android SDK              │
      # ╰──────────────────────────────────────╯
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📜 Accept Licenses & Install SDK
        run: |
          echo "📜 قبول التراخيص..."
          mkdir -p "$ANDROID_HOME/licenses"
          cat > "$ANDROID_HOME/licenses/android-sdk-license" << 'EOF'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          d56f5187479451eabf01fb78af6dfcb131a6481e
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          EOF
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > "$ANDROID_HOME/licenses/intel-android-extra-license"
          yes 2>/dev/null | sdkmanager --licenses > /dev/null 2>&1 || true

          echo ""
          echo "📦 تثبيت مكونات SDK..."

          COMPILE_SDK="${{ steps.config.outputs.compile_sdk }}"
          TARGET_SDK="${{ steps.config.outputs.target_sdk }}"
          BUILD_TOOLS="${{ steps.config.outputs.build_tools }}"
          NDK_VER="${{ steps.config.outputs.ndk_version }}"
          CMAKE_VER="${{ steps.config.outputs.cmake_version }}"

          echo "  📦 platforms;android-${COMPILE_SDK}"
          sdkmanager "platforms;android-${COMPILE_SDK}" > /dev/null 2>&1 || true

          [ "$TARGET_SDK" != "$COMPILE_SDK" ] && {
            echo "  📦 platforms;android-${TARGET_SDK}"
            sdkmanager "platforms;android-${TARGET_SDK}" > /dev/null 2>&1 || true
          }

          sdkmanager "platform-tools" > /dev/null 2>&1 || true

          [ -n "$BUILD_TOOLS" ] && {
            echo "  📦 build-tools;${BUILD_TOOLS}"
            sdkmanager "build-tools;${BUILD_TOOLS}" > /dev/null 2>&1 || true
          }

          # أحدث build-tools
          LATEST_BT=$(sdkmanager --list 2>/dev/null | grep -oP "build-tools;\S+" | tail -1 || echo "")
          [ -n "$LATEST_BT" ] && sdkmanager "$LATEST_BT" > /dev/null 2>&1 || true

          [ -n "$NDK_VER" ] && {
            echo "  📦 ndk;${NDK_VER}"
            sdkmanager "ndk;${NDK_VER}" > /dev/null 2>&1 || true
          }

          [ -n "$CMAKE_VER" ] && {
            echo "  📦 cmake;${CMAKE_VER}"
            sdkmanager "cmake;${CMAKE_VER}" > /dev/null 2>&1 || true
          }

          echo "✅ تم تثبيت SDK"

      # ╭──────────────────────────────────────╮
      # │  📝 STEP 6: Configure                │
      # ╰──────────────────────────────────────╯
      - name: 📝 Configure Project
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            [ -n "${{ steps.config.outputs.ndk_version }}" ] && \
              echo "ndk.dir=$ANDROID_HOME/ndk/${{ steps.config.outputs.ndk_version }}"
          } > local.properties
          echo "✅ local.properties"

      # ╭──────────────────────────────────────╮
      # │  🔧 STEP 7: Gradle Wrapper           │
      # ╰──────────────────────────────────────╯
      - name: 🔧 Setup Gradle Wrapper
        run: |
          GRADLE_VER="${{ steps.config.outputs.gradle_version }}"

          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "✅ gradlew موجود"

            if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
              echo "⚠️ wrapper.jar مفقود → تحميل Gradle ${GRADLE_VER}..."
              mkdir -p gradle/wrapper
              wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
                -O /tmp/gradle-dl.zip 2>/dev/null || {
                GRADLE_VER="7.5.1"
                wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
                  -O /tmp/gradle-dl.zip
              }
              unzip -q /tmp/gradle-dl.zip -d /tmp/gradle-install
              /tmp/gradle-install/gradle-${GRADLE_VER}/bin/gradle wrapper \
                --gradle-version="${GRADLE_VER}" 2>/dev/null || true
              rm -rf /tmp/gradle-dl.zip /tmp/gradle-install
              chmod +x gradlew
              echo "✅ تم إصلاح wrapper"
            fi
          else
            echo "⚠️ إنشاء gradlew..."
            wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
              -O /tmp/gradle-dl.zip 2>/dev/null || {
              GRADLE_VER="7.5.1"
              wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
                -O /tmp/gradle-dl.zip
            }
            unzip -q /tmp/gradle-dl.zip -d /tmp/gradle-install
            /tmp/gradle-install/gradle-${GRADLE_VER}/bin/gradle wrapper --gradle-version="${GRADLE_VER}"
            rm -rf /tmp/gradle-dl.zip /tmp/gradle-install
            chmod +x gradlew
            echo "✅ تم إنشاء gradlew"
          fi

          echo ""
          [ -f "gradlew" ] && echo "  ✅ gradlew" || echo "  ❌ gradlew"
          [ -f "gradle/wrapper/gradle-wrapper.jar" ] && echo "  ✅ wrapper.jar" || echo "  ❌ wrapper.jar"
          [ -f "gradle/wrapper/gradle-wrapper.properties" ] && echo "  ✅ wrapper.properties" || echo "  ❌ wrapper.properties"

      # ╭──────────────────────────────────────╮
      # │  💾 STEP 8: Cache                    │
      # ╰──────────────────────────────────────╯
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/native
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ steps.config.outputs.jdk_version }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ steps.config.outputs.jdk_version }}-
            gradle-${{ runner.os }}-

      # ╭──────────────────────────────────────╮
      # │  📥 STEP 9: Dependencies             │
      # ╰──────────────────────────────────────╯
      - name: 📥 Resolve Dependencies
        run: |
          echo "📥 تحميل الاعتماديات..."
          ./gradlew dependencies --no-daemon --stacktrace 2>&1 | tail -30 || true
          echo "✅ تم"

      # ╭──────────────────────────────────────╮
      # │  🏗️ STEP 10: Build Debug APK         │
      # ╰──────────────────────────────────────╯
      - name: 🏗️ Build Debug APK
        if: >-
          github.event_name != 'workflow_dispatch' || 
          github.event.inputs.build_type == 'debug' || 
          github.event.inputs.build_type == 'both'
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  🏗️ Building Debug APK                   ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          if ./gradlew assembleDebug \
            --no-daemon --stacktrace --build-cache \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"; then
            echo "✅ تم بناء Debug APK بنجاح!"
          else
            echo "⚠️ فشل → محاولة بديلة (بدون cache)..."
            ./gradlew assembleDebug \
              --no-daemon --stacktrace --no-build-cache --refresh-dependencies \
              -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
            echo "✅ تم بناء Debug APK (المحاولة الثانية)!"
          fi

      # ╭──────────────────────────────────────╮
      # │  🏗️ STEP 11: Build Release APK       │
      # ╰──────────────────────────────────────╯
      - name: 🏗️ Build Release APK
        if: >-
          github.event_name == 'workflow_dispatch' && 
          (github.event.inputs.build_type == 'release' || 
           github.event.inputs.build_type == 'both')
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  🏗️ Building Release APK                 ║"
          echo "╚══════════════════════════════════════════╝"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "🔐 توقيع مع Keystore..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks
            ./gradlew assembleRelease \
              --no-daemon --stacktrace --build-cache \
              -Pandroid.injected.signing.store.file=/tmp/keystore.jks \
              -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
              -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
            rm -f /tmp/keystore.jks
          else
            echo "⚠️ بدون توقيع"
            ./gradlew assembleRelease \
              --no-daemon --stacktrace --build-cache \
              -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
          fi
          echo "✅ تم بناء Release APK!"
        continue-on-error: true

      # ╭──────────────────────────────────────╮
      # │  📊 STEP 12: Summary                 │
      # ╰──────────────────────────────────────╯
      - name: 📊 Build Summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║                📊 ملخص البناء                    ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  اللغة:       ${{ steps.config.outputs.language }}"
          echo "║  DSL:         ${{ steps.config.outputs.dsl }}"
          echo "║  JDK:         ${{ steps.config.outputs.jdk_version }}"
          echo "║  Gradle:      ${{ steps.config.outputs.gradle_version }}"
          echo "║  Compile SDK: ${{ steps.config.outputs.compile_sdk }}"
          echo "║  Target SDK:  ${{ steps.config.outputs.target_sdk }}"
          echo "║  Min SDK:     ${{ steps.config.outputs.min_sdk }}"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  📱 ملفات APK:                                   ║"

          APK_COUNT=0
          while IFS= read -r apk; do
            [ -z "$apk" ] && continue
            APK_COUNT=$((APK_COUNT + 1))
            SIZE=$(du -sh "$apk" 2>/dev/null | cut -f1)
            NAME=$(basename "$apk")
            echo "║  ✅ $NAME ($SIZE)"
          done < <(find . -name "*.apk" -not -path "*/intermediates/*" -not -path "*/.gradle/*" -type f 2>/dev/null | sort)

          [ "$APK_COUNT" -eq 0 ] && echo "║  ❌ لم يتم إنشاء APK"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          [ "$APK_COUNT" -gt 0 ] && echo "💡 حمّل APK من Artifacts أدناه"

      # ╭──────────────────────────────────────╮
      # │  📤 STEP 13: Upload Artifacts        │
      # ╰──────────────────────────────────────╯
      - name: 📤 Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "APK-Debug-build${{ github.run_number }}"
          path: "**/build/outputs/apk/debug/**/*.apk"
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 0

      - name: 📤 Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "APK-Release-build${{ github.run_number }}"
          path: "**/build/outputs/apk/release/**/*.apk"
          if-no-files-found: ignore
          retention-days: 90
          compression-level: 0

      - name: 📤 Upload All APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "All-APKs-build${{ github.run_number }}"
          path: |
            **/build/outputs/apk/**/*.apk
            !**/intermediates/**
          if-no-files-found: ignore
          retention-days: 14

      - name: 📤 Upload Reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "Build-Reports-build${{ github.run_number }}"
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7

      # ╭──────────────────────────────────────╮
      # │  ✅ STEP 14: Final Status            │
      # ╰──────────────────────────────────────╯
      - name: ✅ Final Status
        if: always()
        run: |
          APK=$(find . -name "*.apk" -not -path "*/intermediates/*" -type f 2>/dev/null | wc -l)
          if [ "$APK" -gt 0 ]; then
            echo "🎉 تم البناء بنجاح! ($APK ملف APK)"
            echo "📥 حمّل من قسم Artifacts"
          else
            echo "❌ فشل البناء - راجع السجلات أعلاه"
          fi
